<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Debounce & Throttle Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; margin-top: 20px; }
        .box { border: 1px solid #ccc; padding: 15px; width: 300px; }
    </style>
</head>
<body>

    <h1>Демо оптимизации</h1>
    <input type="text" id="input" placeholder="Начните ввод...">

    <div class="container">
        <div class="box">
            <h3>Debounce</h3>
            <p>Срабатывает через 500мс после окончания ввода.</p>   
            <p>Счётчик вызовов: <span id="debounce-count">0</span></p>
            <div id="debounce-log"></div>
        </div>

        <div class="box">
            <h3>Throttle</h3>
            <p>Срабатывает не чаще, чем раз в 500мс.</p>
            <p>Счётчик вызовов: <span id="throttle-count">0</span></p>
            <div id="throttle-log"></div>
        </div>
    </div>

    <script src="debounce.js"></script>
    <script>
        const input = document.getElementById('input');
        
        // Логирование и счетчики
        let debounceCalls = 0;
        let throttleCalls = 0;

        function sendApiRequest(type) {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] Запрос к API (${type})`);
            
            // Обновляем UI
            if (type === 'debounce') {
                debounceCalls++;
                document.getElementById('debounce-count').innerText = debounceCalls;
                document.getElementById('debounce-log').innerHTML += `<small>[${time}] Запрос</small><br>`;
            } else {
                throttleCalls++;
                document.getElementById('throttle-count').innerText = throttleCalls;
                document.getElementById('throttle-log').innerHTML += `<small>[${time}] Запрос</small><br>`;
            }
        }

        // 3. Создаем обертки (правильный вызов, а не напрямую!)
        const debouncedRequest = debounce(() => sendApiRequest('debounce'), 500);
        const throttledRequest = throttle(() => sendApiRequest('throttle'), 500);

        // Вешаем на события
        input.addEventListener('input', (event) => {
            debouncedRequest();
            throttledRequest();
        });
    </script>
</body>
</html>
